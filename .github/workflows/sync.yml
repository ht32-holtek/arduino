name: Sync to Gitee

on:
  push:
    branches:
      - main  # 如果是 master 請自行修改
  release:
    types: [published] # 未來發布新版本時自動觸發
  workflow_dispatch: # 👈 允許你在網頁上手動點擊按鈕，強制全面同步

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 先同步代碼與 Tags
      - name: Mirror the GitHub repos to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{ github.repository_owner }}
          dst: gitee/${{ secrets.GITEE_USER }}
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "${{ github.event.repository.name }}"
          force_update: true

      # 2. 同步 Release（移除了限制條件，手動執行時也一定會跑這一步！）
      - name: Sync Release to Gitee
        uses: trustedinster/sync-release-gitee@v1.3
        with:
          github_owner: ${{ github.repository_owner }}
          github_repo: ${{ github.event.repository.name }}
          gitee_owner: ${{ secrets.GITEE_USER }}
          gitee_repo: ${{ github.event.repository.name }}
          gitee_token: ${{ secrets.GITEE_TOKEN }}
